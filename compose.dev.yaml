version: '3.8'
services:
  mongodb:
    image: mongo:8.0
    container_name: sequenza-mongodb
    restart: unless-stopped
    ports:
      - '127.0.0.1:27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: sequenza
    volumes:
      - mongodb_data:/data/db
    networks:
      - sequenza-network

volumes:
  mongodb_data:
    driver: local

networks:
  sequenza-network:
    driver: bridge

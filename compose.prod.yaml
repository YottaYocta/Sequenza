version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: sequenza-mongodb-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-sequenza}
    volumes:
      - mongodb_data:/data/db
    networks:
      - sequenza-network
    command: ["--auth"]

  app:
    image: ghcr.io/yottayocta/sequenza:latest
    container_name: sequenza-app-prod
    restart: unless-stopped
    ports:
      - '127.0.0.1:${PORT:-4000}:${PORT:-4000}'
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-sequenza}?authSource=admin
      ORIGIN: ${ORIGIN}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - mongodb
    networks:
      - sequenza-network

volumes:
  mongodb_data:
    driver: local

networks:
  sequenza-network:
    driver: bridge
